x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.mobot:/root/.mobot

services:
  mobot-gateway:
    container_name: mobot-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  mobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["agent"]
    stdin_open: true
    tty: true
